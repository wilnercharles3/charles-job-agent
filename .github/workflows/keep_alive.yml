name: Keep Streamlit App Awake
# Pings the live Streamlit Cloud app every 6 hours so the free-tier container
# doesn't get evicted for inactivity. No secrets needed - the URL is public.

on:
  schedule:
    # 4 pings per day at :23 UTC. Minute 23 keeps us off the top-of-hour
    # rush when GitHub's scheduler delays and skips spike.
    - cron: '23 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Streamlit app
        run: |
          curl --silent --show-error --location \
               --max-time 30 \
               --retry 2 --retry-delay 5 \
               --output /dev/null \
               --write-out "HTTP %{http_code} in %{time_total}s\n" \
               https://charles-job-agent-9cpadgvzhra8g38wsrjecd.streamlit.app/
